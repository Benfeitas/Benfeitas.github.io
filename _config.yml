title: "Rui Benfeitas"
tagline: "Translational research, precision medicine, and systems biology"
description: "Rui Benfeitas — translational research, precision medicine, and systems biology."
author: "Rui Benfeitas"
url: "https://benfeitas.net"
baseurl: ""
lang: en
encoding: utf-8

# where things are
layouts_dir: ./includes/layouts
includes_dir: ./includes/includes
sass:
  sass_dir: ./includes/sass

plugins:
  - jemoji
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-redirect-from

exclude:
  - README.md
  - LICENSE

defaults:
  - scope:
      path: ""
    values:
      logosnav: true

menu:
  - title: Home
    url: "/"
  - title: Teaching
    url: pages/teaching
  - title: Publications
    url: pages/publications
  - title: Resources
    url: pages/resources
  - title: About
    url: pages/about
