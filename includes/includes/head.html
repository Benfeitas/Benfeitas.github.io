<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1"/>

  <meta name="theme-color" content="#ffffff">

  <!-- SEO: title, description, canonical, Open Graph & Twitter tags (jekyll-seo-tag) -->
  {% seo %}

  <!-- Social share image + Twitter card -->
  <meta property="og:image" content="{{ '/includes/assets/img/photo.png' | prepend: site.url }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="{{ '/includes/assets/img/photo.png' | prepend: site.url }}">

  <!-- Favicon (reuses existing photo; swap for a dedicated square favicon.png if you make one) -->
  <link rel="icon" type="image/png" href="{{ site.baseurl }}/includes/assets/img/photo.png">
  <link rel="apple-touch-icon" href="{{ site.baseurl }}/includes/assets/img/photo.png">
  <!-- CSS  -->
  <link href="//fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/0.100.2/css/materialize.min.css">

    <!-- Custom Fonts -->
    <link href='//fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800' rel='stylesheet' type='text/css'>
    <link href='//fonts.googleapis.com/css?family=Merriweather:400,300,300italic,400italic,700,700italic,900,900italic' rel='stylesheet' type='text/css'>

    <link href="{{site.baseurl}}/includes/css/main.css" type="text/css" rel="stylesheet" media="screen,projection"/>

  <!-- Google tag (gtag.js) - GA4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2536EN73GJ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-2536EN73GJ');
  </script>

</head>
